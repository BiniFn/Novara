name: Build Android App

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Grant workflow permission to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clear gradle wrapper cache
      run: |
        rm -rf ~/.gradle/wrapper/dists
        rm -rf ~/.gradle/caches

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        ndk-version: 27.0.12077973
        cmake-version: 3.22.1

    - name: Build with Gradle
      run: ./gradlew clean assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

    - name: Upload APKs (per-ABI)
      uses: actions/upload-artifact@v4
      with:
        name: Novara-App-debug-apks
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload APKs to existing release 'Apps'
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "Apps"
        name: "Novara debug APKs (run #${{ github.run_number }})"
        artifacts: Novara-App-debug-apks
        replacesArtifacts: true
        update: true
        draft: false
        prerelease: false
