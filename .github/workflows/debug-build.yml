name: Debug Build (arm64-v8a)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clear gradle wrapper cache
      run: |
        rm -rf ~/.gradle/wrapper/dists
        rm -rf ~/.gradle/caches

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        ndk-version: 27.0.12077973
        cmake-version: 3.22.1

    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --no-daemon --stacktrace -Dorg.gradle.java.home=$JAVA_HOME

    - name: List APK outputs
      run: find app/build/outputs/apk -name "*.apk" -type f

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v4
      with:
        name: Kototoro-debug-arm64-v8a
        path: app/build/outputs/apk/debug/*arm64-v8a*.apk
        if-no-files-found: error
