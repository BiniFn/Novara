name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Generate Changelog
      id: changelog
      run: |
        # Find the most recent tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        echo "Previous Tag: $PREVIOUS_TAG"
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "No previous tag found. Getting all logs."
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "Getting logs between $PREVIOUS_TAG and HEAD"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD" --no-merges)
        fi
        
        # Escape for GITHUB_OUTPUT
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          echo "No keystore found, creating debug keystore"
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD || 'password' }}"
    
    - name: Get version info
      id: version
      run: |
        # Use Gradle to get version info (handles Groovy expressions)
        VERSION_NAME=$(./gradlew -q printVersionName --no-daemon | tail -n 1)
        VERSION_CODE=$(./gradlew -q printVersionCode --no-daemon | tail -n 1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME ($VERSION_CODE)"
    
    - name: List build outputs
      run: |
        echo "Listing APK outputs:"
        find app/build/outputs/apk -name "*.apk" -type f
    
    - name: Collect Release APKs
      id: assets
      run: |
        mkdir -p release
        shopt -s nullglob
        APK_FILES=(app/build/outputs/apk/release/*.apk)
        if [ ${#APK_FILES[@]} -eq 0 ]; then
          echo "Error: No APK file found in app/build/outputs/apk/release"
          exit 1
        fi

        for apk in "${APK_FILES[@]}"; do
          filename=$(basename "$apk")
          abi="${filename#app-}"
          abi="${abi%-release-unsigned.apk}"
          abi="${abi%-release.apk}"
          if [ "$abi" = "$filename" ] || [ -z "$abi" ]; then
            abi="universal"
          fi
          if [ "$abi" = "universal" ]; then
            # Keep legacy filename for compatibility with old update clients.
            target="release/Kototoro-${{ steps.version.outputs.version_name }}-release.apk"
          else
            target="release/Kototoro-${{ steps.version.outputs.version_name }}-${abi}-release.apk"
          fi
          cp "$apk" "$target"
        done
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.release_tag }}
        name: Kototoro ${{ steps.version.outputs.version_name }}
        files: |
          release/*.apk
        body: ${{ inputs.release_notes != '' && inputs.release_notes || steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
