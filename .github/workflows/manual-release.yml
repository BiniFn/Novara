name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Manual release build'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Setup keystore
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
        else
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Kototoro, OU=Dev, O=Kototoro, L=City, S=State, C=CN"
        fi
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD || 'password' }}"
    
    - name: Get version info
      id: version
      run: |
        # Use Gradle to get version info (handles Groovy expressions)
        VERSION_NAME=$(./gradlew -q printVersionName --no-daemon | tail -n 1)
        VERSION_CODE=$(./gradlew -q printVersionCode --no-daemon | tail -n 1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME ($VERSION_CODE)"
    
    - name: List build outputs
      run: |
        echo "Listing APK outputs:"
        find app/build/outputs/apk -name "*.apk" -type f
    
    - name: Prepare release files
      run: |
        mkdir -p release
        # Find the release APK (handles different naming patterns)
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found in app/build/outputs/apk/release"
          exit 1
        fi
        echo "Found APK: $APK_FILE"
        cp "$APK_FILE" release/Kototoro-${{ steps.version.outputs.version_name }}.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.release_tag }}
        name: Kototoro ${{ inputs.release_tag }}
        body: |
          ${{ inputs.release_notes }}
          
          **Version:** ${{ steps.version.outputs.version_name }} (Build ${{ steps.version.outputs.version_code }})
          
          **下载:** Kototoro-${{ steps.version.outputs.version_name }}.apk
        files: release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
