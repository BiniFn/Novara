name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Generate Changelog
      id: changelog
      run: |
        # Find the most recent tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        echo "Previous Tag: $PREVIOUS_TAG"
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "No previous tag found. Getting all logs."
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "Getting logs between $PREVIOUS_TAG and HEAD"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD" --no-merges)
        fi
        
        # Escape for GITHUB_OUTPUT
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          echo "No keystore found, creating debug keystore"
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD || 'password' }}"
    
    - name: Get version info
      id: version
      run: |
        # Use Gradle to get version info (handles Groovy expressions)
        VERSION_NAME=$(./gradlew -q printVersionName --no-daemon | tail -n 1)
        VERSION_CODE=$(./gradlew -q printVersionCode --no-daemon | tail -n 1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME ($VERSION_CODE)"
    
    - name: List build outputs
      run: |
        echo "Listing APK outputs:"
        find app/build/outputs/apk -name "*.apk" -type f
    
    - name: Rename APK
      run: |
        mkdir -p release
        # Find the release APK (handles different naming patterns)
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found in app/build/outputs/apk/release"
          exit 1
        fi
        echo "Found APK: $APK_FILE"
        cp "$APK_FILE" release/Kototoro-${{ steps.version.outputs.version_name }}-release.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.release_tag }}
        name: Kototoro ${{ steps.version.outputs.version_name }}
        files: |
          release/*.apk
        body: |
          ## Kototoro ${{ steps.version.outputs.version_name }}
          
          ${{ inputs.release_notes }}
          
          ### 下载说明
          - `Kototoro-${{ steps.version.outputs.version_name }}-release.apk` - 正式版本
          
          ### 版本信息
          - Version Name: ${{ steps.version.outputs.version_name }}
          - Version Code: ${{ steps.version.outputs.version_code }}
          
          ### 安装说明
          1. 下载APK文件
          2. 在Android设备上安装
          3. 如果是首次安装，需要允许安装未知来源应用
          ### Changelog
          ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
