name: Sync Parser Commits

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update parser commit hashes
        id: update_parsers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/sync_parsers.py

      - name: Commit changes
        if: steps.update_parsers.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.update_parsers.outputs.commit_message }}
          file_pattern: |
            gradle/libs.versions.toml
            app/build.gradle

      - name: Create tag
        if: steps.update_parsers.outputs.updated == 'true' && steps.update_parsers.outputs.tag != ''
        env:
          TAG_NAME: ${{ steps.update_parsers.outputs.tag }}
        run: |
          # Delete local tag if it exists (from a previous failed run)
          git tag -d "${TAG_NAME}" 2>/dev/null || true
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Trigger release workflow
        if: steps.update_parsers.outputs.updated == 'true' && steps.update_parsers.outputs.tag != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: trigger-release
          client-payload: '{"tag": "${{ steps.update_parsers.outputs.tag }}"}'
