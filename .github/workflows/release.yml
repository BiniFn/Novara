name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          echo "No keystore found, creating debug keystore"
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD || 'password' }}"
    
    - name: Get version info
      id: version
      run: |
        # Use Gradle to get version info (handles Groovy expressions)
        VERSION_NAME=$(./gradlew -q printVersionName --no-daemon | tail -n 1)
        VERSION_CODE=$(./gradlew -q printVersionCode --no-daemon | tail -n 1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME ($VERSION_CODE)"
    
    - name: Rename APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/app-release.apk \
           release/Kototoro-${{ steps.version.outputs.version_name }}-release.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.apk
        body: |
          ## Kototoro ${{ steps.version.outputs.version_name }}
          
          ### 下载说明
          - `Kototoro-${{ steps.version.outputs.version_name }}-release.apk` - 正式版本
          
          ### 版本信息
          - Version Name: ${{ steps.version.outputs.version_name }}
          - Version Code: ${{ steps.version.outputs.version_code }}
          
          ### 安装说明
          1. 下载APK文件
          2. 在Android设备上安装
          3. 如果是首次安装，需要允许安装未知来源应用
          
          ### Changelog
          请查看提交历史了解详细更新内容
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
