import java.time.LocalDateTime
import java.util.zip.ZipFile

plugins {
	id 'com.android.application'
	id 'kotlin-android'
	id 'com.google.devtools.ksp'
	id 'kotlin-parcelize'
	id 'com.google.dagger.hilt.android'
	id 'androidx.room'
	id 'org.jetbrains.kotlin.plugin.serialization'
	id 'org.jetbrains.kotlin.plugin.compose'
	// enable if needed
	// id 'dev.reformator.stacktracedecoroutinator'
}

room {
	schemaDirectory("$projectDir/schemas")
}

android {
	compileSdk = 36
	buildToolsVersion = '35.0.0'
	namespace = 'org.skepsun.kototoro'

	signingConfigs {
		release {
			// Only configure signing if properties are provided
			if (project.hasProperty('RELEASE_STORE_FILE')) {
				storeFile file(RELEASE_STORE_FILE)
				storePassword RELEASE_STORE_PASSWORD
				keyAlias RELEASE_KEY_ALIAS
				keyPassword RELEASE_KEY_PASSWORD
			}
		}
	}

	defaultConfig {
		applicationId 'org.skepsun.kototoro'
		minSdk = 26
		targetSdk = 36
        versionCode = 1139
        versionName = '1.1.3'
		manifestPlaceholders = [
			appClassName: 'org.skepsun.kototoro.KototoroApp'
		]
		generatedDensities = []
		testInstrumentationRunner 'org.skepsun.kototoro.HiltTestRunner'
		ksp {
			arg('room.generateKotlin', 'true')
		}
		androidResources {
			// https://issuetracker.google.com/issues/408030127
			generateLocaleConfig false
		}
		def localProperties = new Properties()
		def localPropertiesFile = rootProject.file('local.properties')
		if (localPropertiesFile.exists()) {
			localProperties.load(new FileInputStream(localPropertiesFile))
		}
		resValue 'string', 'tg_backup_bot_token', localProperties.getProperty('tg_backup_bot_token', '')
		def dandanAppId = (project.findProperty('dandanplay.appId')
			?: localProperties.getProperty('dandanplay.appId')
			?: 'demo_app_id').toString()
		def dandanAppSecret = (project.findProperty('dandanplay.appSecret')
			?: localProperties.getProperty('dandanplay.appSecret')
			?: 'demo_app_secret').toString()
		buildConfigField 'String', 'DANDANPLAY_APP_ID', "\"${dandanAppId}\""
		buildConfigField 'String', 'DANDANPLAY_APP_SECRET', "\"${dandanAppSecret}\""
		externalNativeBuild {
			cmake {
				cppFlags ""
				abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
			}
		}
	}
	externalNativeBuild {
		cmake {
			path "src/main/cpp/CMakeLists.txt"
			version "3.22.1"
		}
	}
	buildTypes {
		debug {
			applicationIdSuffix = '.debug'
		}
		release {
			minifyEnabled true
			shrinkResources true
			proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
			// Only apply signing config if it's properly configured
			if (project.hasProperty('RELEASE_STORE_FILE')) {
				signingConfig signingConfigs.release
			}
		}
		nightly {
			initWith release
			applicationIdSuffix = '.nightly'
			matchingFallbacks = ['release', 'debug']
		}
	}
	splits {
		abi {
			enable true
			reset()
			include 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
			universalApk true
		}
	}
	buildFeatures {
		viewBinding true
		buildConfig true
		compose true
	}
	packagingOptions {
		jniLibs {
			useLegacyPackaging = true
			pickFirsts += [
				'lib/arm64-v8a/libquickjs.so',
				'lib/armeabi-v7a/libquickjs.so',
				'lib/x86/libquickjs.so',
				'lib/x86_64/libquickjs.so',
				'**/libc++_shared.so'
			]
		}
		resources {
			excludes += [
				'META-INF/README.md',
				'META-INF/NOTICE.md',
				'META-INF/LICENSE.md',
				'META-INF/LICENSE-notice.md',
				'META-INF/versions/9/OSGI-INF/MANIFEST.MF',
				'META-INF/AL2.0',
				'META-INF/LGPL2.1',
				// djl/tokenizers ships desktop binaries that are useless for Android APK.
				'native/lib/osx-aarch64/**',
				'native/lib/win-x86_64/**',
				'native/lib/linux-x86_64/**'
			]
		}
	}
	sourceSets {
		androidTest.assets.srcDirs += files("$projectDir/schemas".toString())
		main.java.srcDirs += 'src/main/kotlin/'
		test.java.srcDirs += 'src/test/kotlin/'
		androidTest.java.srcDirs += 'src/androidTest/kotlin/'
	}
	compileOptions {
		coreLibraryDesugaringEnabled true
		sourceCompatibility JavaVersion.VERSION_11
		targetCompatibility JavaVersion.VERSION_11
	}
	kotlinOptions {
		jvmTarget = JavaVersion.VERSION_11.toString()
		freeCompilerArgs += [
			'-opt-in=kotlin.ExperimentalStdlibApi',
			'-opt-in=kotlinx.coroutines.ExperimentalCoroutinesApi',
			'-opt-in=kotlinx.coroutines.ExperimentalForInheritanceCoroutinesApi',
			'-opt-in=kotlinx.coroutines.InternalForInheritanceCoroutinesApi',
			'-opt-in=kotlinx.coroutines.FlowPreview',
			'-opt-in=kotlin.contracts.ExperimentalContracts',
			'-opt-in=coil3.annotation.ExperimentalCoilApi',
			'-opt-in=coil3.annotation.InternalCoilApi',
			'-opt-in=kotlinx.serialization.ExperimentalSerializationApi',
			'-Xjspecify-annotations=strict',
			'-Xannotation-default-target=first-only',
			'-Xtype-enhancement-improvements-strict-mode'
		]
	}
	lint {
		abortOnError true
		checkReleaseBuilds false
		disable 'MissingTranslation', 'PrivateResource', 'SetJavaScriptEnabled', 'SimpleDateFormat'
	}
	testOptions {
		unitTests.includeAndroidResources true
		unitTests.returnDefaultValues true
		unitTests.all {
			useJUnitPlatform()
		}
		execution 'ANDROIDX_TEST_ORCHESTRATOR'
		animationsDisabled = true
		kotlinOptions {
			freeCompilerArgs += ['-opt-in=org.skepsun.kototoro.parsers.InternalParsersApi']
		}
	}
	applicationVariants.configureEach { variant ->
		if (variant.name == 'nightly') {
			variant.outputs.each { output ->
				def now = LocalDateTime.now()
				output.versionCodeOverride = now.format("yyMMdd").toInteger()
				output.versionNameOverride = 'N' + now.format("yyyyMMdd")
			}
		}
	}
}


hilt {
    // Enable aggregating task for KSP/Hilt to avoid generic assisted factory validation issues in release
    enableAggregatingTask = true
}

def cloudstreamSourceJar = layout.projectDirectory.file('libs/cloudstream3-pre-release.jar')
def cloudstreamSanitizedJarTask = tasks.register('prepareCloudstreamRuntimeJar', Jar) {
	archiveBaseName.set('cloudstream3-runtime')
	archiveVersion.set('pre-release')
	destinationDirectory.set(layout.buildDirectory.dir('generated/cloudstream'))
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	preserveFileTimestamps = false
	reproducibleFileOrder = true

	from({
		def sourceJar = cloudstreamSourceJar.asFile
		if (!sourceJar.exists()) {
			throw new GradleException("Missing Cloudstream source jar: ${sourceJar.absolutePath}")
		}
		zipTree(sourceJar)
	}) {
		// The host app already ships these runtime pieces. Keep the Cloudstream runtime jar focused on
		// the API/plugin classes we actually use and strip library/app generated glue that causes R8 duplicates.
		exclude 'coil3/**'
		exclude 'androidx/**'
		exclude 'com/google/android/material/**'
		exclude 'com/lagradost/cloudstream3/databinding/**'
		exclude 'com/lagradost/cloudstream3/metaproviders/**'
		exclude 'com/lagradost/cloudstream3/plugins/PluginManager*.class'
		exclude 'com/lagradost/cloudstream3/plugins/PluginManagerKt.class'
		exclude 'com/lagradost/cloudstream3/plugins/RepositoryManager*.class'
		exclude 'com/lagradost/cloudstream3/plugins/VotingApi*.class'
		exclude 'com/lagradost/cloudstream3/receivers/**'
		exclude 'com/lagradost/cloudstream3/services/**'
		exclude 'com/lagradost/cloudstream3/syncproviders/AccountManager*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/Auth*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/PlainAuthRepo*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/SubtitleAPI*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/SubtitleRepo*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/SyncAPI*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/SyncRepo*.class'
		exclude 'com/lagradost/cloudstream3/syncproviders/providers/**'
		exclude 'com/lagradost/cloudstream3/ui/**'
		exclude 'com/lagradost/cloudstream3/widget/**'
		exclude 'com/lagradost/cloudstream3/actions/VideoClickActionHolder.class'
		exclude 'com/lagradost/cloudstream3/actions/temp/**'
		exclude 'com/lagradost/cloudstream3/extractors/Youtube*.class'
		exclude 'com/lagradost/cloudstream3/utils/ApkInstaller*.class'
		exclude 'com/lagradost/cloudstream3/utils/BackupUtils*.class'
		exclude 'com/lagradost/cloudstream3/utils/BatteryOptimizationChecker*.class'
		exclude 'com/lagradost/cloudstream3/utils/BiometricAuthenticator*.class'
		exclude 'com/lagradost/cloudstream3/utils/CastHelper*.class'
		exclude 'com/lagradost/cloudstream3/utils/CastOptionsProvider*.class'
		exclude 'com/lagradost/cloudstream3/utils/DataStore*.class'
		exclude 'com/lagradost/cloudstream3/utils/DataStoreHelper*.class'
		exclude 'com/lagradost/cloudstream3/utils/FillerEpisodeCheck*.class'
		exclude 'com/lagradost/cloudstream3/utils/InAppUpdater*.class'
		exclude 'com/lagradost/cloudstream3/utils/SubtitleUtils*.class'
		exclude 'com/lagradost/cloudstream3/utils/TestingUtils*.class'
		exclude 'com/lagradost/cloudstream3/utils/TvChannelUtils*.class'
		exclude 'com/lagradost/cloudstream3/utils/downloader/**'
		exclude 'com/lagradost/cloudstream3/AcraApplication*.class'
		exclude 'com/lagradost/cloudstream3/CloudStreamApp*.class'
		exclude 'com/lagradost/cloudstream3/CommonActivity*.class'
		exclude 'com/lagradost/cloudstream3/DownloaderTestImpl*.class'
		exclude 'com/lagradost/cloudstream3/MainActivity.class'
		exclude 'com/lagradost/cloudstream3/MainActivity$*.class'
		exclude { details ->
			def path = details.path
			def isGeneratedGlue = (path ==~ /.*\/R(\$[^\/]+)?\.class$/) || path.endsWith('/BuildConfig.class')
			def isCloudstreamOwned = path.startsWith('com/lagradost/cloudstream3/') || path.startsWith('com/lagradost/api/')
			return isGeneratedGlue && !isCloudstreamOwned
		}
	}

	doLast {
		def outputJar = archiveFile.get().asFile
		def forbiddenEntries = []
		ZipFile zipFile = new ZipFile(outputJar)
		try {
			zipFile.entries().each { entry ->
				if (
					entry.name.startsWith('coil3/') ||
					entry.name.startsWith('androidx/') ||
					entry.name.startsWith('com/google/android/material/') ||
					(
						(entry.name ==~ /.*\/R(\$[^\/]+)?\.class$/ || entry.name.endsWith('/BuildConfig.class')) &&
						!entry.name.startsWith('com/lagradost/cloudstream3/') &&
						!entry.name.startsWith('com/lagradost/api/')
					)
				) {
					forbiddenEntries << entry.name
				}
			}
		} finally {
			zipFile.close()
		}
		if (!forbiddenEntries.isEmpty()) {
			throw new GradleException("Sanitized Cloudstream jar still contains forbidden entries: ${forbiddenEntries.take(5)}")
		}
	}
}

def cloudstreamRuntimeJar = files(cloudstreamSanitizedJarTask.flatMap { it.archiveFile })

